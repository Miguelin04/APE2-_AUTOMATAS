<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Autómatas</title>
    <meta name="description" content="Aplicación para resolver operaciones de Lenguajes Formales y Autómatas">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="blob-c">
        <div class="blob"></div>
        <div class="blob blob-2"></div>
    </div>
    
    <div class="container glass">
        <header>
            <h1>Teoría de Autómatas</h1>
            <p>Calculadora de Lenguajes Formales</p>
        </header>

        <div class="layout">
            <aside class="sidebar">
                <button class="nav-btn active" data-target="generar_cadenas">Generación de Cadenas</button>
                <button class="nav-btn" data-target="pertenencia">Pertenencia</button>
                <button class="nav-btn" data-target="union">Unión de Lenguajes</button>
                <button class="nav-btn" data-target="concatenacion">Concatenación</button>
                <button class="nav-btn" data-target="kleene_star">Clausura de Kleene</button>
                <button class="nav-btn" data-target="kleene_plus">Kleene Plus</button>
                <button class="nav-btn" data-target="analizar_crecimiento">Crecimiento</button>
            </aside>

            <main class="content">
                <!-- Secciones dinámicas -->
                <section id="generar_cadenas" class="tab-pane active">
                    <h2>Generación de Cadenas</h2>
                    <div class="input-group">
                        <label>Alfabeto Σ (Separado por comas):</label>
                        <input type="text" id="gen_alfabeto" placeholder="Ej: a,b">
                    </div>
                    <div class="input-group">
                        <label>Longitud Máxima n:</label>
                        <input type="number" id="gen_max_len" value="2" min="1">
                    </div>
                    <button class="action-btn" onclick="executeGenerar()">Generar</button>
                </section>

                <section id="pertenencia" class="tab-pane">
                    <h2>Pertenencia</h2>
                    <div class="input-group">
                        <label>Cadena a verificar:</label>
                        <input type="text" id="pert_cadena" placeholder="Ej: abba">
                    </div>
                    <div class="input-group">
                        <label>Lenguaje (Separado por comas):</label>
                        <input type="text" id="pert_lenguaje" placeholder="Ej: aaa,abba,bb">
                    </div>
                    <button class="action-btn" onclick="executePertenencia()">Verificar</button>
                </section>

                <section id="union" class="tab-pane">
                    <h2>Unión de Lenguajes</h2>
                    <div class="input-group">
                        <label>Lenguaje 1 (Separado por comas):</label>
                        <input type="text" id="uni_l1" placeholder="Ej: aa,bb">
                    </div>
                    <div class="input-group">
                        <label>Lenguaje 2 (Separado por comas):</label>
                        <input type="text" id="uni_l2" placeholder="Ej: bb,cc">
                    </div>
                    <button class="action-btn" onclick="executeUnion()">Unir</button>
                </section>

                <section id="concatenacion" class="tab-pane">
                    <h2>Concatenación</h2>
                    <div class="input-group">
                        <label>Lenguaje 1 (Separado por comas):</label>
                        <input type="text" id="con_l1" placeholder="Ej: a,b">
                    </div>
                    <div class="input-group">
                        <label>Lenguaje 2 (Separado por comas):</label>
                        <input type="text" id="con_l2" placeholder="Ej: 0,1">
                    </div>
                    <button class="action-btn" onclick="executeConcatenacion()">Concatenar</button>
                </section>

                <section id="kleene_star" class="tab-pane">
                    <h2>Clausura de Kleene (L*)</h2>
                    <div class="input-group">
                        <label>Lenguaje (Separado por comas):</label>
                        <input type="text" id="ks_l" placeholder="Ej: a,b">
                    </div>
                    <div class="input-group">
                        <label>Iteraciones Máximas:</label>
                        <input type="number" id="ks_iter" value="2" min="1">
                    </div>
                    <button class="action-btn" onclick="executeKleeneStar()">Calcular L*</button>
                </section>

                <section id="kleene_plus" class="tab-pane">
                    <h2>Kleene Plus (L⁺)</h2>
                    <div class="input-group">
                        <label>Lenguaje (Separado por comas):</label>
                        <input type="text" id="kp_l" placeholder="Ej: a,b">
                    </div>
                    <div class="input-group">
                        <label>Iteraciones Máximas:</label>
                        <input type="number" id="kp_iter" value="2" min="1">
                    </div>
                    <button class="action-btn" onclick="executeKleenePlus()">Calcular L⁺</button>
                </section>

                <section id="analizar_crecimiento" class="tab-pane">
                    <h2>Crecimiento del Lenguaje</h2>
                    <div class="input-group">
                        <label>Lenguaje (Separado por comas):</label>
                        <input type="text" id="cre_l" placeholder="Ej: a,b">
                    </div>
                    <button class="action-btn" onclick="executeCrecimiento()">Analizar hasta iteración 5</button>
                </section>

                <div class="results glass-dark">
                    <h3>Resultados:</h3>
                    <div id="resultado_box" class="resultado-box">
                        <span class="placeholder">Selecciona una operación y presiona el botón.</span>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
